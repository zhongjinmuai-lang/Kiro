apiVersion: apps/v1
kind: Deployment
metadata:
  name: mu-api-server
  namespace: mu-framework
  labels:
    app: mu-api-server
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mu-api-server
  template:
    metadata:
      labels:
        app: mu-api-server
        tier: backend
    spec:
      containers:
        - name: api-server
          image: mu-framework/backend:latest
          command: ["./api-server"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MU_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mu-db-secret
                  key: host
            - name: MU_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mu-db-secret
                  key: password
            - name: MU_REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: mu-config
                  key: redis_addr
            - name: MU_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mu-jwt-secret
                  key: secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mu-api-server
  namespace: mu-framework
spec:
  selector:
    app: mu-api-server
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mu-api-server-hpa
  namespace: mu-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mu-api-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
