apiVersion: v1
kind: ConfigMap
metadata:
  name: mu-config
  namespace: mu-framework
data:
  redis_addr: "mu-redis:6379"
  server_mode: "prod"
  agent_max_workers: "50"
  agent_queue_size: "10000"
---
apiVersion: v1
kind: Secret
metadata:
  name: mu-db-secret
  namespace: mu-framework
type: Opaque
stringData:
  host: "mu-postgres"
  port: "5432"
  user: "mu_admin"
  password: "CHANGE_ME_IN_PRODUCTION"
  dbname: "mu_framework"
---
apiVersion: v1
kind: Secret
metadata:
  name: mu-jwt-secret
  namespace: mu-framework
type: Opaque
stringData:
  secret: "CHANGE_ME_JWT_SECRET_IN_PRODUCTION"
