apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mu-ingress
  namespace: mu-framework
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.mu-framework.com
        - admin.mu-framework.com
      secretName: mu-tls-secret
  rules:
    - host: api.mu-framework.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mu-api-server
                port:
                  number: 8080
    - host: admin.mu-framework.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mu-frontend
                port:
                  number: 80
