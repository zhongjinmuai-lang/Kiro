apiVersion: apps/v1
kind: Deployment
metadata:
  name: mu-agent-engine
  namespace: mu-framework
  labels:
    app: mu-agent-engine
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mu-agent-engine
  template:
    metadata:
      labels:
        app: mu-agent-engine
        tier: backend
    spec:
      containers:
        - name: agent-engine
          image: mu-framework/backend:latest
          command: ["./agent-engine"]
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: MU_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mu-db-secret
                  key: host
            - name: MU_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mu-db-secret
                  key: password
            - name: MU_REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: mu-config
                  key: redis_addr
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          volumeMounts:
            - name: plugins
              mountPath: /app/plugins
      volumes:
        - name: plugins
          persistentVolumeClaim:
            claimName: mu-plugins-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mu-agent-engine
  namespace: mu-framework
spec:
  selector:
    app: mu-agent-engine
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
