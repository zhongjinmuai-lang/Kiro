version: "3.9"

# ============================================================
# 👪 终端客户服务器独立/贴牌部署
# 部署内容：仅 admin-customer 前端 + Nginx（反代到开发商 API）
# ============================================================

services:
  mu-customer-web:
    build:
      context: ../../
      dockerfile: deploy/customer/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: mu-customer-web
    environment:
      DEVELOPER_API_URL: ${DEVELOPER_API_URL}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
