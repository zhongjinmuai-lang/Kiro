worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;

    # 通用 upstream
    upstream mu_api_upstream   { server mu-api:8080;   }
    upstream mu_admin_upstream { server mu-admin:8081; }

    # 开发商总后台（端口 80）
    server {
        listen 80;
        server_name _ admin.mu-framework.local localhost;

        root /usr/share/nginx/html/developer;
        index index.html;

        location / { try_files $uri $uri/ /index.html; }

        location /api/ {
            proxy_pass http://mu_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }
        location /admin/ {
            proxy_pass http://mu_admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }
        # WebSocket for 站内信
        location /ws {
            proxy_pass http://mu_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
    }

    # 服务商管理后台（端口 8000）
    server {
        listen 8000;
        server_name _ provider.mu-framework.local;

        root /usr/share/nginx/html/provider;
        index index.html;

        location / { try_files $uri $uri/ /index.html; }
        location /api/   { proxy_pass http://mu_api_upstream;   include /etc/nginx/common.inc*; }
        location /admin/ { proxy_pass http://mu_admin_upstream; include /etc/nginx/common.inc*; }
    }

    # 终端客户业务后台（端口 8001）
    server {
        listen 8001;
        server_name _ customer.mu-framework.local;

        root /usr/share/nginx/html/customer;
        index index.html;

        location / { try_files $uri $uri/ /index.html; }
        location /api/   { proxy_pass http://mu_api_upstream;   include /etc/nginx/common.inc*; }
        location /admin/ { proxy_pass http://mu_admin_upstream; include /etc/nginx/common.inc*; }
    }
}
