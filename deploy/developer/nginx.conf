worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 2048; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;

    # ====== CORS 配置（供服务商/终端客户跨域调用）======
    map $http_origin $cors_origin {
        default "";
        "~^https?://.*$" $http_origin;
    }

    upstream mu_api   { server mu-api:8080;   keepalive 32; }
    upstream mu_admin { server mu-admin:8081; keepalive 32; }
    upstream mu_agent { server mu-agent:8082; keepalive 32; }

    # HTTP 主服务
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 开发商前端
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ====== 后端 API（开放跨域给服务商/终端）======
        location /api/ {
            # CORS 预检
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Tenant-ID, X-Trace-ID" always;
                add_header Access-Control-Expose-Headers "X-New-Access-Token, X-New-Refresh-Token, X-Trace-ID" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Expose-Headers "X-New-Access-Token, X-New-Refresh-Token, X-Trace-ID" always;

            proxy_pass http://mu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Tenant-ID, X-Trace-ID" always;
                add_header Access-Control-Expose-Headers "X-New-Access-Token, X-New-Refresh-Token, X-Trace-ID" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Expose-Headers "X-New-Access-Token, X-New-Refresh-Token, X-Trace-ID" always;

            proxy_pass http://mu_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /agent/ {
            proxy_pass http://mu_agent;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # WebSocket 站内信
        location /ws {
            proxy_pass http://mu_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        location = /health { proxy_pass http://mu_api/health; }
    }

    # HTTPS 主服务（生产请启用）
    # server {
    #     listen 443 ssl http2;
    #     server_name api.mu-developer.com;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     # 其余 location 与 HTTP 相同
    # }
}
