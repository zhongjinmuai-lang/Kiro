# ============================================================
# MU Framework v2.3 生产环境配置
# 运行时通过环境变量覆盖（Viper AutomaticEnv）：
#   MU_DATABASE_HOST / MU_DATABASE_PASSWORD / MU_REDIS_ADDR / MU_JWT_SECRET ...
#
# 宝塔部署：环境变量从 .env.production 注入（PM2 加载）
# Docker 部署：通过 docker-compose.yml env_file 注入
# ============================================================

app:
  name:    mu-framework
  version: "2.3.0"
  env:     prod

server:
  port:          8080
  admin_port:    8081
  agent_port:    8082
  mode:          release
  read_timeout:  30s
  write_timeout: 60s
  idle_timeout:  120s

database:
  host:               127.0.0.1
  port:               5432
  user:               mu_admin
  password:           ""          # 生产环境通过 MU_DATABASE_PASSWORD 环境变量覆盖
  dbname:             mu_framework
  sslmode:            disable
  timezone:           Asia/Shanghai
  max_open_conns:     100
  max_idle_conns:     20
  conn_max_lifetime:  1h
  conn_max_idle_time: 10m
  log_sql:            false
  slow_threshold:     500ms

redis:
  mode:      standalone
  addr:      127.0.0.1:6379
  password:  ""                   # 生产环境通过 MU_REDIS_PASSWORD 环境变量覆盖
  db:        0
  pool_size: 50
  min_idle:  10

logger:
  level:       info
  format:      json
  output:      both
  dir:         ./logs
  file_name:   mu-framework.log
  max_size:    200
  max_age:     90
  max_backups: 30
  compress:    true
  caller:      true
  stacktrace:  true

jwt:
  secret:               ""        # 必须通过 MU_JWT_SECRET 环境变量设置！
  issuer:               mu-framework
  access_ttl:           2h
  refresh_ttl:          168h
  auto_renew_threshold: 15m

agent:
  plugin_dir:      ./plugins
  max_workers:     50
  task_queue_size: 10000
  evolution_cycle: 1800           # 进化周期：30 分钟
  task_timeout:    300            # 默认任务超时：5 分钟

platform:
  payment:
    enabled: true
  storage:
    enabled:   true
    base_path: ./storage
  notify:
    enabled: true

swagger:
  enabled: false                  # 生产环境默认关闭 Swagger UI
  path:    /swagger/*any
  title:   MU Framework API
  version: v2.3
